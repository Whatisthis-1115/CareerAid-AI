<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>匹配结果 - 基于AI的大学生职业规划智能体</title>
    <link rel="stylesheet" href="static/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div class="brand">
          <div class="title">匹配结果</div>
          <div class="subtitle">TOP5 岗位 + 雷达图展示各维度匹配度</div>
        </div>
        <div class="nav"></div>
      </div>

      <div class="grid">
        <div class="card">
          <h2>TOP5 岗位</h2>
          <div class="form">
            <div>
              <label>你的目标（可选）</label>
              <input id="goal" placeholder="例如：想走数据分析方向，优先互联网/新能源" />
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap">
              <button class="btn primary" id="run">开始匹配</button>
              <a class="btn" href="upload.html">先去解析简历</a>
            </div>
            <div class="hint" id="msg"></div>
          </div>
          <div class="hr"></div>
          <div class="list" id="list"></div>
        </div>

        <div class="card">
          <h2>维度匹配雷达图</h2>
          <div class="hint">默认展示 TOP1 的维度匹配度（0-100）。</div>
          <div class="hr"></div>
          <div id="radar" style="height:360px"></div>
          <div class="hr"></div>
          <div class="item">
            <div class="title">差距分析与建议</div>
            <pre class="mono" id="gap" style="white-space:pre-wrap;word-break:break-word;margin:0"></pre>
          </div>
        </div>
      </div>
    </div>

    <script src="static/app.js"></script>
    <script>
      CareerAid.mountTopbar("match");
      if (!CareerAid.requireAuth()) throw new Error("not authed");

      const listEl = CareerAid.qs("list");
      const msgEl = CareerAid.qs("msg");
      const gapEl = CareerAid.qs("gap");
      const radarDom = document.getElementById("radar");
      const radar = echarts.init(radarDom);

      const DIM4 = ["基础要求", "职业技能", "职业素养", "发展潜力"];
      const DIM10 = ["专业技能", "证书要求", "创新能力", "学习能力", "抗压能力", "沟通能力", "实习能力", "团队协作", "问题解决", "职业稳定性"];

      function renderRadar(dim, dim4) {
        const use4 = dim4 && Object.keys(dim4).length >= 2;
        const keys = use4 ? DIM4 : (dim && Object.keys(dim).length >= 5 ? DIM10.slice(0, 6) : DIM4);
        const vals = use4
          ? DIM4.map((k) => Number(dim4[k] != null ? dim4[k] : 50))
          : keys.map((k) => Number(dim && dim[k] != null ? dim[k] : 50));
        radar.setOption({
          backgroundColor: "transparent",
          tooltip: {},
          radar: {
            indicator: keys.map((k) => ({ name: k, max: 100 })),
            splitArea: { areaStyle: { color: ["rgba(255,255,255,.03)", "rgba(255,255,255,.01)"] } },
            axisName: { color: "rgba(232,238,252,.85)" },
            splitLine: { lineStyle: { color: "rgba(255,255,255,.10)" } },
            axisLine: { lineStyle: { color: "rgba(255,255,255,.10)" } },
          },
          series: [
            {
              type: "radar",
              data: [
                {
                  value: vals,
                  name: "匹配度",
                  areaStyle: { color: "rgba(110,168,254,.25)" },
                  lineStyle: { color: "rgba(110,168,254,.95)" },
                  itemStyle: { color: "rgba(110,168,254,.95)" },
                },
              ],
            },
          ],
        });
      }

      function renderList(matches) {
        listEl.innerHTML = "";
        matches.slice(0, 5).forEach((m, idx) => {
          const div = document.createElement("div");
          div.className = "item";
          const d4 = m.dimension_scores_4 || {};
          const d4Text = Object.keys(d4).length ? (" 四维：" + DIM4.map((k) => k + " " + (d4[k] || 0) + "%").join(" ")) : "";
          div.innerHTML =
            '<div class="title">' +
            (idx + 1) +
            ". " +
            CareerAid.escapeHtml(m.job_title) +
            " <span class='score " +
            CareerAid.scoreClass(m.score) +
            "'>" +
            m.score +
            "%</span></div>" +
            '<div class="meta">' +
            "<span class='badge'>" +
            CareerAid.escapeHtml(m.industry || "未知行业") +
            "</span>" +
            "<span class='badge'>" +
            CareerAid.escapeHtml(m.salary || "薪资未标注") +
            "</span>" +
            (d4Text ? "<span class='badge'>" + CareerAid.escapeHtml(d4Text.trim()) + "</span>" : "") +
            "</div>" +
            "<div style='display:flex;gap:10px;flex-wrap:wrap;margin-top:10px'>" +
            "<button class='btn' data-idx='" +
            idx +
            "'>查看维度/差距</button>" +
            "</div>";
          div.querySelector("button").addEventListener("click", () => {
            renderRadar(m.dimension_scores || {}, m.dimension_scores_4 || {});
            gapEl.textContent = JSON.stringify(m.gap_analysis || {}, null, 2);
          });
          listEl.appendChild(div);
        });
      }

      async function run() {
        msgEl.textContent = "匹配中...";
        gapEl.textContent = "";
        try {
          const goal = CareerAid.qs("goal").value.trim();
          const data = await CareerAid.apiFetch("/match_jobs", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ goal }),
          });
          const matches = data.matches || [];
          msgEl.textContent = "完成。";
          renderList(matches);
          if (matches[0]) {
            renderRadar(matches[0].dimension_scores || {}, matches[0].dimension_scores_4 || {});
            gapEl.textContent = JSON.stringify(matches[0].gap_analysis || {}, null, 2);
          } else {
            renderRadar(null, null);
            gapEl.textContent = "暂无匹配结果。";
          }
        } catch (e) {
          msgEl.textContent = "失败：" + (e.message || String(e));
          renderRadar(null, null);
        }
      }

      CareerAid.qs("run").addEventListener("click", run);
      renderRadar(null, null);
    </script>
  </body>
</html>
